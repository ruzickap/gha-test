---
# GitHub Actions workflow for validating Docker setup
# Manually triggered to verify the docker/setup-docker-action with the
# containerd snapshotter feature enabled
name: setup-docker-action

on:
  workflow_dispatch:

permissions: read-all

jobs:
  setup-docker-action:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
