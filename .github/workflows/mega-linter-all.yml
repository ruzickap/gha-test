---
# GitHub Actions workflow for MegaLinter code quality checks
# Runs comprehensive linting and security checks on all supported file types
# https://megalinter.io/
# Flavors: https://megalinter.io/v9/flavors/
name: mega-linter-all

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Default MegaLinter (all linters)
  mega-linter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter
        uses: oxsecurity/megalinter@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optimized for pure C/C++ projects
  mega-linter-c_cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter c_cpp
        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/c_cpp@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optimized for CI items (Dockerfile, Jenkinsfile, JSON/YAML schemas, XML)
  mega-linter-ci_light:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter ci_light
        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/ci_light@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # MegaLinter for the most commonly used languages
  mega-linter-cupcake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
