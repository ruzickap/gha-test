        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/cupcake@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # MegaLinter for documentation projects
  mega-linter-documentation:
