        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/documentation@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optimized for C, C++, C# or VB based projects
  mega-linter-dotnet:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter dotnet
        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/dotnet@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optimized for C, C++, C# or VB based projects with JS/TS
  mega-linter-dotnetweb:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter dotnetweb
        # renovate: datasource=github-tags depName=oxsecurity/megalinter
        uses: oxsecurity/megalinter/flavors/dotnetweb@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Contains only formatters
  mega-linter-formatters:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 💡 MegaLinter formatters
        # renovate: datasource=github-tags depName=oxsecurity/megalinter
